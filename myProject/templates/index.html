<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>

<body>
    <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
    <div class="container my-3 p-5">
        <div class="text-center my-2">
            <h1>Expense Tracker</h1>
            <i class="bi bi-pencil-square"></i>
        </div>
        <div class="my-4 p-5 shadow-lg">
            <div class="d-flex justify-content-between align-self-center" style="width: 30rem;">
                <div>
                    <h4>Income</h4>
                    <p class="lead" id="in">0</p>
                </div>
                <div>
                    <h4>Expense</h4>
                    <p class="lead" id="out">0</p>
                </div>
            </div>
            <div style="height: 150px; overflow-y: scroll;">
                <ol>

                </ol>
            </div>
            <hr>
            <div>
                <label for="title">Name of transaction</label>
                <input class="form-control" type="text" name="title" id="title">
                <br>
                <hr>
                <label for="amount">Amount</label>
                <input class="form-control" type="number" name="amount" id="amount">
            </div>
            <div class="my-3">
                <!-- <button class="btn btn-success me-3" id="income">Income</button>
                <button class="btn btn-danger" id="expense">Expense</button> -->

                <div class="form-floating">
                    <!-- <label for="transactionType">Select Type:</label> -->
                    <select class="form-select" name="transactionType" id="type">
                        <option disabled selected>Select</option>
                        <option value="income">Credit (Income) </option>
                        <option value="expense">Debit (Expense) </option>
                    </select>
                    <label for="type">Transaction Type</label>

                </div>

                <br>
                <div id="dynamic-buttons">

                </div>
            </div>
        </div>
    </div>
    <script src="/static/index.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
